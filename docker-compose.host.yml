# Codara Eyes — deploy standalone no host, integrado ao Traefik do Coolify.
# Isolado em rede propria (codara-eyes-net); o `web` tambem entra na rede
# `coolify` (externa) só para o Traefik conseguir rotear ate ele.
# Sem Caddy, sem ports no host. SSL via resolver ACME `letsencrypt` do Traefik.
#
# Subir: docker compose -f docker-compose.host.yml up -d --build

services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: codara-eyes-web
    restart: unless-stopped
    mem_limit: 768m
    environment:
      NODE_ENV: production
      PORT: 3000
      APP_URL: ${APP_URL}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      AUTH_SECRET: ${AUTH_SECRET}
      APP_PASSWORD: ${APP_PASSWORD}
      ARTIFACTS_DIR: /data/artifacts
    volumes:
      - artifacts:/data/artifacts
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
      - coolify
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    labels:
      - traefik.enable=true
      - traefik.docker.network=coolify
      # roteador HTTPS
      - "traefik.http.routers.codara-eyes-https.rule=Host(`eyes.vps.codara.agency`)"
      - traefik.http.routers.codara-eyes-https.entrypoints=https
      - traefik.http.routers.codara-eyes-https.tls=true
      - traefik.http.routers.codara-eyes-https.tls.certresolver=letsencrypt
      - traefik.http.routers.codara-eyes-https.service=codara-eyes-svc
      - traefik.http.services.codara-eyes-svc.loadbalancer.server.port=3000
      # roteador HTTP -> redirect 443
      - "traefik.http.routers.codara-eyes-http.rule=Host(`eyes.vps.codara.agency`)"
      - traefik.http.routers.codara-eyes-http.entrypoints=http
      - traefik.http.routers.codara-eyes-http.middlewares=codara-eyes-redirect
      - traefik.http.middlewares.codara-eyes-redirect.redirectscheme.scheme=https

  worker:
    build:
      context: .
      dockerfile: apps/vision-worker/Dockerfile
    container_name: codara-eyes-worker
    restart: unless-stopped
    mem_limit: 3g
    environment:
      VISION_WORKER_PORT: 8000
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      ARTIFACTS_DIR: /data/artifacts
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      WORKER_POLL_INTERVAL: ${WORKER_POLL_INTERVAL:-2}
      WORKER_REAP_TIMEOUT: ${WORKER_REAP_TIMEOUT:-120}
    volumes:
      - artifacts:/data/artifacts
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  db:
    image: postgres:16-alpine
    container_name: codara-eyes-db
    restart: unless-stopped
    mem_limit: 256m
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pgdata:
  artifacts:

networks:
  internal:
    name: codara-eyes-net
  coolify:
    external: true
