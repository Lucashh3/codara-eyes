# Codara Eyes — compose adaptado para deploy no Coolify (Traefik faz o proxy).
#
# Diferenças vs docker-compose.yml original:
#   1. Serviço `caddy` REMOVIDO — o Traefik do Coolify já ocupa 80/443 e faz
#      o SSL automático. O Caddy embutido causaria conflito de porta no host.
#   2. Nenhum `ports:` exposto no host — só o `web` é publicado, e via Traefik.
#      No Coolify, defina o domínio https://eyes.vps.codara.agency no serviço
#      `web` (a UI injeta os labels do Traefik e conecta na rede do proxy).
#   3. `mem_limit` em cada serviço — protege a RAM dos outros serviços da VPS.
#   4. `expose: 3000` no web para o Coolify saber a porta a rotear.
#
# Subir: pelo Coolify (recurso Docker Compose apontando para este arquivo).

services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: codara-eyes-web
    restart: unless-stopped
    mem_limit: 768m
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      APP_URL: ${APP_URL:-https://eyes.vps.codara.agency}
      DATABASE_URL: postgres://${POSTGRES_USER:-codara}:${POSTGRES_PASSWORD:-codara}@db:5432/${POSTGRES_DB:-codara_eyes}
      AUTH_SECRET: ${AUTH_SECRET:-}
      APP_PASSWORD: ${APP_PASSWORD:-}
      ARTIFACTS_DIR: /data/artifacts
    volumes:
      - artifacts:/data/artifacts
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  worker:
    build:
      context: .
      dockerfile: apps/vision-worker/Dockerfile
    container_name: codara-eyes-worker
    restart: unless-stopped
    mem_limit: 1g
    environment:
      VISION_WORKER_PORT: 8000
      DATABASE_URL: postgres://${POSTGRES_USER:-codara}:${POSTGRES_PASSWORD:-codara}@db:5432/${POSTGRES_DB:-codara_eyes}
      ARTIFACTS_DIR: /data/artifacts
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      WORKER_POLL_INTERVAL: ${WORKER_POLL_INTERVAL:-2}
      WORKER_REAP_TIMEOUT: ${WORKER_REAP_TIMEOUT:-120}
    volumes:
      - artifacts:/data/artifacts
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  db:
    image: postgres:16-alpine
    container_name: codara-eyes-db
    restart: unless-stopped
    mem_limit: 256m
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-codara}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-codara}
      POSTGRES_DB: ${POSTGRES_DB:-codara_eyes}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-codara} -d ${POSTGRES_DB:-codara_eyes}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pgdata:
  artifacts:
