<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login · Codara Eyes</title>
  <style>
    :root {
      --bg:      oklch(98% 0.005 250);
      --surface: oklch(100% 0 0);
      --fg:      oklch(22% 0.02 240);
      --muted:   oklch(50% 0.018 240);
      --border:  oklch(90% 0.008 240);
      --accent:  oklch(58% 0.16 145);

      --accent-soft: color-mix(in oklch, var(--accent) 14%, transparent);
      --fg-soft:     color-mix(in oklch, var(--fg) 6%, transparent);

      --font-display: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', system-ui, sans-serif;
      --font-body:    -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', system-ui, sans-serif;
      --font-mono:    'JetBrains Mono', 'IBM Plex Mono', ui-monospace, Menlo, monospace;

      --fs-h1: clamp(28px, 4vw, 36px);
      --fs-body: 15px;
      --fs-meta: 13px;

      --gap-sm: 12px;
      --gap-md: 20px;
      --gap-lg: 32px;

      --radius: 8px;
      --radius-lg: 12px;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html { height: 100%; }
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font-body);
      font-size: var(--fs-body);
      line-height: 1.55;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }

    .login-container {
      width: 100%;
      max-width: 400px;
      padding: 24px;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 40px 32px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: var(--gap-lg);
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: grid;
      place-items: center;
    }

    .logo-icon svg {
      width: 20px;
      height: 20px;
      color: white;
    }

    .logo-text {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .login-header {
      margin-bottom: var(--gap-lg);
    }

    .login-header h1 {
      font-family: var(--font-display);
      font-size: var(--fs-h1);
      font-weight: 600;
      letter-spacing: -0.02em;
      margin: 0 0 8px;
    }

    .login-header p {
      color: var(--muted);
      margin: 0;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: var(--gap-md);
    }

    .form-group label {
      display: block;
      font-size: var(--fs-meta);
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .input-wrapper {
      position: relative;
    }

    .input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--fg);
      font: inherit;
      font-size: 15px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .input-password {
      padding-right: 48px;
    }

    .toggle-password {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .toggle-password:hover {
      color: var(--fg);
    }

    .toggle-password svg {
      width: 18px;
      height: 18px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 12px 20px;
      border-radius: var(--radius);
      border: none;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, transform 0.05s;
    }

    .btn:active {
      transform: translateY(1px);
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover {
      background: color-mix(in oklch, var(--accent) 88%, black);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .message {
      padding: 12px 14px;
      border-radius: var(--radius);
      font-size: 14px;
      margin-bottom: var(--gap-md);
      display: none;
    }

    .message.error {
      background: oklch(95% 0.05 25);
      color: oklch(45% 0.15 25);
      border: 1px solid oklch(85% 0.08 25);
      display: block;
    }

    .message.success {
      background: oklch(95% 0.05 145);
      color: oklch(40% 0.12 145);
      border: 1px solid oklch(85% 0.08 145);
      display: block;
    }

    .footer-note {
      margin-top: var(--gap-lg);
      text-align: center;
      font-size: var(--fs-meta);
      color: var(--muted);
    }

    .footer-note a {
      color: var(--accent);
      text-decoration: none;
    }

    .footer-note a:hover {
      text-decoration: underline;
    }

    /* Loading spinner */
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid transparent;
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    /* GSAP animation prep */
    .login-card,
    .logo,
    .login-header h1,
    .login-header p,
    .form-group,
    .btn-primary,
    .footer-note {
      opacity: 0;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
</head>
<body>
  <div class="login-container">
    <div class="login-card" data-od-id="login-card">
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M12 5c-4.5 0-8 3-9.5 7 1.5 4 5 7 9.5 7s8-3 9.5-7c-1.5-4-5-7-9.5-7z"/>
          </svg>
        </div>
        <span class="logo-text">Codara Eyes</span>
      </div>

      <div class="login-header">
        <h1>Entrar</h1>
        <p>Acesse sua conta para analisar landing pages</p>
      </div>

      <div id="message" class="message"></div>

      <form id="login-form">
        <div class="form-group">
          <label for="password">Senha</label>
          <div class="input-wrapper">
            <input
              type="password"
              id="password"
              class="input input-password"
              placeholder="Digite sua senha"
              autocomplete="current-password"
              required
            />
            <button type="button" class="toggle-password" id="toggle-password" aria-label="Mostrar senha">
              <svg id="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="3"/>
                <path d="M12 5c-4.5 0-8 3-9.5 7 1.5 4 5 7 9.5 7s8-3 9.5-7c-1.5-4-5-7-9.5-7z"/>
              </svg>
              <svg id="icon-eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary" id="submit-btn">
          <span id="btn-text">Entrar</span>
          <div class="spinner" id="btn-spinner" style="display:none;"></div>
        </button>
      </form>

      <p class="footer-note">
        Acesso interno · <a href="mailto:suporte@codara.com">Precisa de ajuda?</a>
      </p>
    </div>
  </div>

  <script>
    const form = document.getElementById('login-form');
    const passwordInput = document.getElementById('password');
    const toggleBtn = document.getElementById('toggle-password');
    const iconEye = document.getElementById('icon-eye');
    const iconEyeOff = document.getElementById('icon-eye-off');
    const message = document.getElementById('message');
    const submitBtn = document.getElementById('submit-btn');
    const btnText = document.getElementById('btn-text');
    const btnSpinner = document.getElementById('btn-spinner');

    // Toggle password visibility
    toggleBtn.addEventListener('click', () => {
      const isPassword = passwordInput.type === 'password';
      passwordInput.type = isPassword ? 'text' : 'password';
      iconEye.style.display = isPassword ? 'none' : 'block';
      iconEyeOff.style.display = isPassword ? 'block' : 'none';
      toggleBtn.setAttribute('aria-label', isPassword ? 'Ocultar senha' : 'Mostrar senha');
    });

    // Form submission
    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      // Show loading state
      submitBtn.disabled = true;
      btnText.textContent = 'Entrando...';
      btnSpinner.style.display = 'block';
      message.className = 'message';
      message.textContent = '';

      // Simulate API call
      await new Promise(resolve => setTimeout(resolve, 1200));

      const password = passwordInput.value;

      if (password.length >= 6) {
        message.className = 'message success';
        message.textContent = 'Login realizado com sucesso! Redirecionando...';

        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 800);
      } else {
        message.className = 'message error';
        message.textContent = 'Senha incorreta. Tente novamente.';
        submitBtn.disabled = false;
        btnText.textContent = 'Entrar';
        btnSpinner.style.display = 'none';
      }
    });

    // GSAP Animations
    document.addEventListener('DOMContentLoaded', () => {
      const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });

      tl.fromTo('.login-card',
        { opacity: 0, y: 30, scale: 0.96 },
        { opacity: 1, y: 0, scale: 1, duration: 0.6 }
      )
      .fromTo('.logo',
        { opacity: 0, x: -20 },
        { opacity: 1, x: 0, duration: 0.4 },
        '-=0.3'
      )
      .fromTo('.login-header h1',
        { opacity: 0, y: 15 },
        { opacity: 1, y: 0, duration: 0.4 },
        '-=0.2'
      )
      .fromTo('.login-header p',
        { opacity: 0, y: 10 },
        { opacity: 1, y: 0, duration: 0.3 },
        '-=0.2'
      )
      .fromTo('.form-group',
        { opacity: 0, y: 15 },
        { opacity: 1, y: 0, duration: 0.4 },
        '-=0.15'
      )
      .fromTo('.btn-primary',
        { opacity: 0, y: 10 },
        { opacity: 1, y: 0, duration: 0.4 },
        '-=0.2'
      )
      .fromTo('.footer-note',
        { opacity: 0 },
        { opacity: 1, duration: 0.4 },
        '-=0.2'
      );

      // Button hover animation
      const btn = document.querySelector('.btn-primary');
      btn.addEventListener('mouseenter', () => {
        gsap.to(btn, { scale: 1.02, duration: 0.2, ease: 'power2.out' });
      });
      btn.addEventListener('mouseleave', () => {
        gsap.to(btn, { scale: 1, duration: 0.2, ease: 'power2.out' });
      });

      // Input focus animation
      const input = document.querySelector('.input');
      input.addEventListener('focus', () => {
        gsap.to('.input-wrapper', { scale: 1.01, duration: 0.2 });
      });
      input.addEventListener('blur', () => {
        gsap.to('.input-wrapper', { scale: 1, duration: 0.2 });
      });
    });
  </script>
</body>
</html>
